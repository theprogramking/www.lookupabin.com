<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline BIN Lookup — Instant Card Identifier</title>
    <meta
      name="description"
      content="Instant offline BIN/IIN lookup tool. Search credit cards without API calls, tracking, or internet. Updated regularly for accuracy."
    />
    <meta
      name="keywords"
      content="BIN lookup, IIN lookup, offline credit card checker, instant BIN search, card type, card issuer, credit card validation"
    />
    <meta name="author" content="BIN lookup LLC" />
    <meta
      property="og:title"
      content="Offline BIN Lookup — Instant Card Identifier"
    />
    <meta
      property="og:description"
      content="Search BIN/IIN numbers instantly offline. No API, no tracking. Always up-to-date."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lookupabin.com/" />
    <meta property="og:image" content="https://lookupabin.com/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme-preference");
          if (t === "light" || t === "dark")
            document.documentElement.classList.add(t);
          else document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta name="theme-color" content="#e0e5ec" />
    <link rel="canonical" href="https://lookupabin.com/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
